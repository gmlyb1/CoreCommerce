<div th:fragment="header">

<!-- ================= TOP BAR ================= -->
<div class="bg-white border-bottom small">

                    ⚙
                </a>

                <ul class="dropdown-menu dropdown-menu-end shadow-sm p-2">

                    <li th:if="${loginUser == null}">
                        <a class="dropdown-item" href="/login">
                            로그인
                        </a>
                    </li>

                    <li th:if="${loginUser == null}">
                        <a class="dropdown-item" href="/register">
                            회원가입
                        </a>
                    </li>

                    <th:block th:if="${loginUser != null}">

                        <!-- 관리자 메뉴 -->
                        <li th:if="${loginUser.role == 'MANAGER'}">
                            <a class="dropdown-item" href="/admin/banner/list">
                                🏷 배너 관리
                            </a>
                        </li>

                        <li th:if="${loginUser.role == 'MANAGER'}">
                            <a class="dropdown-item" href="/admin/popup/list">
                                📢 팝업 관리
                            </a>
                        </li>

                        <li th:if="${loginUser.role == 'MANAGER'}">
                            <a class="dropdown-item" href="/admin/member/list">
                                🔑 회원 관리
                            </a>
                        </li>
                        
                        <li th:if="${loginUser.role == 'MANAGER' or loginUser.role == 'PRODUCTER'}">
						    <a class="dropdown-item" href="/admin/orders">
						        📦 주문 관리
						    </a>
						</li>
						
						<li th:if="${loginUser.role == 'MANAGER'}">
						    <a class="dropdown-item" href="/admin/visitLog/list">
						        🕓 접속기록 관리
						    </a>
						</li>
						
						<li th:if="${loginUser.role == 'MANAGER'}">
						    <a class="dropdown-item" href="/admin/coupons">
						        🎟 쿠폰 관리
						    </a>
						</li>

						<li th:if="${loginUser.role == 'MANAGER' or loginUser.role == 'PRODUCTER'}">
						    <a class="dropdown-item" href="/admin/chat/rooms">
						        💬 관리자 채팅방
						    </a>
						</li>

                            <a class="dropdown-item" href="/wishlist/list">
                                ❤️ 찜 목록
                            </a>
                        </li>

                        <li>
                            <a class="dropdown-item" href="/member/profile">
                                👤 프로필
                            </a>
                        </li>

                        <li>
                            <a class="dropdown-item text-danger" href="/logout">
                                🚪 로그아웃
                            </a>
                        </li>

                    </th:block>

                </ul>
            </div>

        </div>
    </div>
</div>


<!-- ================= LOGO + SEARCH + ICON ================= -->
<div class="bg-white shadow-sm">
    <div class="container py-4">

        <div class="row align-items-center">

			    <!-- 관리자 쿠폰 -->
			    <a th:if="${loginUser.role == 'MANAGER'}"

			        <small>쿠폰</small>

			    <!-- 관리자 대시보드 -->
			    <a th:if="${loginUser.role == 'MANAGER'}"

			        <div class="icon-circle">📊</div>
			        <small>통계</small>
			    </a>

    </div>

<style>

/* 기본 스타일 */
.navbar-nav .nav-link {
    position: relative;
    transition: color 0.3s ease;
    color: #333 !important;
    font-weight: 500;
}

/* 🔥 hover 글자 색만 변경 */
.navbar-nav .nav-link:hover {
    color: #0d6efd !important;
}

/* 🔵 밑줄 애니메이션 */
.navbar-nav .nav-link::after {
    content: "";
    position: absolute;
    left: 50%;
    bottom: 0;
    width: 0;
    height: 3px;
    background: #0d6efd;
    transition: all 0.3s ease;
    transform: translateX(-50%);
    border-radius: 10px;
}

/* hover 하면 라인 확장 */
.navbar-nav .nav-link:hover::after {
    width: 60%;
}

/* 현재 활성 메뉴 */
.active-line {
    color: #0d6efd !important;
}

.active-line::after {
    width: 60%;
}

.header-icon {
    color: #333;
    font-size: 13px;
}

.icon-circle{
    width:45px;
    height:45px;
    border-radius:50%;
    border:1px solid #ddd;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:20px;
    background:white;
    transition: all 0.2s;
}

.header-icon:hover .icon-circle{
    background:#212529;
    color:white;
    transform:translateY(-2px);
}

.header-icon small{
    display:block;
    margin-top:4px;
    font-size:12px;
}



</style>
