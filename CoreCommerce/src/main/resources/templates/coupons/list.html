<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="layout/head :: head"></head>

<body>

<div th:replace="layout/header :: header"></div>

<div class="container mt-5" style="max-width:900px;">

    <h3 class="mb-4">🎁 사용 가능 쿠폰</h3>

    <!-- ================= 쿠폰 반복 ================= -->
    <div th:each="coupon : ${coupons}"
         class="card shadow-sm rounded-4 p-4 mb-4 coupon-card"
         th:classappend="${
             coupon.used ? ' coupon-used' :
             (!coupon.coupon.active 
              or (coupon.coupon.totalQuantity > 0 
                  and coupon.coupon.totalQuantity - coupon.coupon.issuedQuantity <= 0))
             ? ' coupon-disabled' : ''
         }">

        <!-- ================= 쿠폰 헤더 ================= -->
        <div class="d-flex justify-content-between align-items-center mb-3">

            <div>
                <h5 class="fw-bold mb-1" th:text="${coupon.coupon.name}"></h5>
                <span class="badge bg-dark" th:text="${coupon.coupon.type}"></span>
            </div>

            <!-- 수량 -->
            <div class="text-end">
                <div class="small text-muted">
                    총 발급 : <span th:text="${coupon.coupon.totalQuantity}"></span>
                </div>
                <div class="small text-muted">
                    발급 완료 : <span th:text="${coupon.coupon.issuedQuantity}"></span>
                </div>
                <div class="small text-danger fw-bold"
                     th:if="${coupon.coupon.totalQuantity > 0 
                             and coupon.coupon.totalQuantity - coupon.coupon.issuedQuantity > 0}">
                    남은 수량 : <span th:text="${coupon.coupon.totalQuantity - coupon.coupon.issuedQuantity}"></span>
                </div>
            </div>
        </div>

        <!-- ================= 쿠폰 상세 ================= -->
        <div class="mb-2">
            💰 할인 :
            <span class="fw-bold text-primary" th:text="${coupon.coupon.discountValue}"></span>
            <span th:if="${coupon.coupon.type == 'PERCENT'}">%</span>
            <span th:if="${coupon.coupon.type == 'FIXED'}">원</span>
        </div>

        <div class="mb-2">
            🛒 최소 주문 금액 :
            <span th:text="${#numbers.formatInteger(coupon.coupon.minOrderPrice,0,'COMMA')}"></span> 원
        </div>

        <div class="mb-2">
            ⏰ 유효기간 :
            <span th:text="${coupon.coupon.startDate}"></span> ~
            <span th:text="${coupon.coupon.endDate}"></span>
        </div>

        <!-- ================= 쿠폰 상태 배지 ================= -->
        <div class="mb-3">
            <span class="badge bg-secondary"
                  th:if="${myCouponIds.contains(coupon.id) and !coupon.used}">
                ✅ 보유중
            </span>

            <span class="badge bg-danger"
                  th:if="${myCouponIds.contains(coupon.id) and coupon.used}">
                ❌ 사용 완료
            </span>

            <span class="badge bg-success"
                  th:if="${!myCouponIds.contains(coupon.id) 
                           and coupon.coupon.active
                           and (coupon.coupon.totalQuantity == 0 
                                or coupon.coupon.totalQuantity - coupon.coupon.issuedQuantity > 0)}">
                사용 가능
            </span>

            <span class="badge bg-danger"
                  th:if="${!coupon.coupon.active and !myCouponIds.contains(coupon.id)}">
                사용 불가
            </span>

            <span class="badge bg-dark"
                  th:if="${coupon.coupon.totalQuantity > 0 
                           and coupon.coupon.totalQuantity - coupon.coupon.issuedQuantity <= 0 
                           and !myCouponIds.contains(coupon.id)}">
                소진
            </span>
        </div>

        <!-- ================= 쿠폰 버튼 ================= -->
        <div class="text-end">
            <form method="post" th:action="@{/coupons/receive}"
                  th:if="${coupon.coupon.active 
                          and (coupon.coupon.totalQuantity == 0 
                               or coupon.coupon.totalQuantity - coupon.coupon.issuedQuantity > 0)
                          and !myCouponIds.contains(coupon.id)}">
                <input type="hidden" name="couponId" th:value="${coupon.id}">
                <button class="btn btn-primary rounded-pill px-4">🎟 쿠폰 받기</button>
            </form>
        </div>

        <!-- ================= 사용완료 도장 ================= -->
        <div class="coupon-stamp" th:if="${coupon.used}">
            USED
        </div>

    </div>

    <!-- ================= 페이지네이션 ================= -->
    <div>
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${pagination.first} ? 'disabled'">
                <a class="page-link" th:href="@{/coupons/list(page=${pagination.page - 1})}">‹</a>
            </li>

            <li class="page-item"
                th:each="i : ${#numbers.sequence(
                    T(java.lang.Math).max(1, pagination.page - 2),
                    T(java.lang.Math).min(pagination.totalPages, pagination.page + 2)
                )}"
                th:classappend="${i == pagination.page} ? 'active'">
                <a class="page-link" th:href="@{/coupons/list(page=${i})}" th:text="${i}"></a>
            </li>

            <li class="page-item" th:classappend="${pagination.last} ? 'disabled'">
                <a class="page-link" th:href="@{/coupons/list(page=${pagination.page + 1})}">›</a>
            </li>
        </ul>
    </div>
</div>

<style>
.pagination {
    display: flex;
    justify-content: center;
    gap: 5px;
}
.pagination .page-item { display: inline-block; }

/* 비활성 쿠폰 */
.coupon-disabled {
    opacity: 0.6;
    background: #f5f5f5;
}

/* 카드 기본 */
.coupon-card {
    transition: all 0.2s;
    position: relative;
}
.coupon-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
}

/* ================= 사용완료 스타일 ================= */
.coupon-used {
    opacity: 0.75;
    filter: grayscale(40%);
}

/* hover 막기 */
.coupon-used:hover {
    transform: none;
    box-shadow: none;
}

/* 도장 */
.coupon-stamp {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(-20deg);

    border: 4px dashed #dc3545;
    color: #dc3545;
    font-size: 34px;
    font-weight: 900;
    padding: 12px 40px;

    border-radius: 10px;
    background: rgba(255,255,255,0.7);

    letter-spacing: 4px;
    text-transform: uppercase;

    z-index: 10;
    pointer-events: none;

    box-shadow: 0 0 0 4px rgba(220,53,69,0.15);
}
</style>

<div th:replace="layout/footer :: footer"></div>

</body>
</html>
