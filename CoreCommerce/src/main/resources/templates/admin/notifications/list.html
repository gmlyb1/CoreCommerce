<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout/head :: head"></head>
<body>

<div th:replace="layout/header :: header"></div>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold">🔔 알림 센터</h3>
    </div>

    <!-- ================= 알림 메뉴 ================= -->
    <div class="notification-menu">

        <!-- 1:1 문의 -->
        <a th:if="${loginUser.role == 'MANAGER'}"
           th:href="@{/admin/notifications(type='INQUIRY', page=1)}"
           th:classappend="${currentType == 'INQUIRY'} ? 'active' : ''"
           class="menu-card">
            <div class="menu-icon">💬</div>
            <div class="menu-title">1:1 문의</div>
        </a>

        <!-- 결제 -->
        <a th:if="${loginUser.role == 'MANAGER'}"
           th:href="@{/admin/notifications(type='ORDER', page=1)}"
           th:classappend="${currentType == 'ORDER'} ? 'active' : ''"
           class="menu-card">
            <div class="menu-icon">🧾</div>
            <div class="menu-title">결제</div>
        </a>

        <!-- 채팅 -->
        <a th:href="@{/admin/notifications(type='CHAT', page=1)}"
           th:classappend="${currentType == 'CHAT'} ? 'active' : ''"
           class="menu-card">
            <div class="menu-icon">🔔</div>
            <div class="menu-title">채팅</div>
        </a>

    </div>

    <!-- ================= 알림 목록 ================= -->
    <div class="card shadow-sm mt-4">
        <ul class="list-group list-group-flush">

            <!-- 알림 반복 -->
            <li th:each="note : ${notifications}"
                th:class="'list-group-item d-flex justify-content-between align-items-center ' + (${note.read} ? 'read-note' : 'unread-note')">

                <span class="d-flex align-items-center">

                    <strong class="badge me-2"
                            th:classappend="${note.read} ? 'bg-secondary' : 'bg-danger'"
                            th:text="${note.type}">
                    </strong>

                    <a th:href="@{${note.link}}"
                       th:text="${note.content}"
                       class="text-decoration-none notification-link">
                    </a>

                    <!-- 안읽은 표시 점 -->
                    <span th:if="${!note.read}" class="unread-dot"></span>

                </span>

                <small class="text-muted"
                       th:text="${#temporals.format(note.createdAt,'yyyy-MM-dd HH:mm')}">
                </small>

            </li>

            <!-- 알림 없을 때 -->
            <li th:if="${notifications.isEmpty()}"
                class="list-group-item text-center text-muted py-4">
                선택한 카테고리의 알림이 없습니다.
            </li>

        </ul>
    </div>

    <!-- ================= 페이징 ================= -->
    <div class="mt-4" th:if="${!notifications.isEmpty() and pagination.totalPages > 0}">
        <ul class="pagination justify-content-center d-flex flex-row">

            <!-- 이전 -->
            <li class="page-item" th:classappend="${pagination.first} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/admin/notifications(type=${currentType != null} ? ${currentType} : '', page=${pagination.page - 1})}">
                    ‹
                </a>
            </li>

            <!-- 페이지 번호 -->
            <li class="page-item"
                th:each="i : ${#numbers.sequence(
                    T(java.lang.Math).max(1, pagination.page - 2),
                    T(java.lang.Math).min(pagination.totalPages, pagination.page + 2)
                )}"
                th:classappend="${i == pagination.page} ? 'active'">

                <a class="page-link"
                   th:href="@{/admin/notifications(type=${currentType != null} ? ${currentType} : '', page=${i})}"
                   th:text="${i}">
                </a>

            </li>

            <!-- 다음 -->
            <li class="page-item" th:classappend="${pagination.last} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/admin/notifications(type=${currentType != null} ? ${currentType} : '', page=${pagination.page + 1})}">
                    ›
                </a>
            </li>

        </ul>
    </div>

</div>

<div th:replace="layout/footer :: footer"></div>

<style>
/* ================= 메뉴 영역 ================= */
.notification-menu{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(180px,1fr));
    gap:18px;
}

.menu-card{
    background:white;
    border-radius:14px;
    padding:20px;
    text-align:center;
    text-decoration:none;
    color:#333;
    border:1px solid #eee;
    transition: all 0.25s ease;
}

.menu-icon{
    font-size:32px;
    margin-bottom:8px;
}

.menu-title{
    font-weight:600;
    font-size:15px;
}

.menu-card:hover{
    transform:translateY(-4px);
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
    border-color:#0d6efd;
}

.menu-card.active{
    background:#0d6efd;
    color:white;
    border-color:#0d6efd;
}

.menu-card.active .menu-icon{
    transform:scale(1.1);
}

/* ================= 알림 스타일 ================= */

/* 안읽은 알림 */
.unread-note{
    background:#eef5ff;
    font-weight:600;
}

/* 읽은 알림 */
.read-note{
    background:white;
    color:#888;
}

/* 읽은 알림 링크 */
.read-note .notification-link{
    color:#888;
}

/* hover */
.unread-note:hover{
    background:#e3efff;
}

/* 안읽은 빨간 점 */
.unread-dot{
    width:8px;
    height:8px;
    background:#ff3b3b;
    border-radius:50%;
    display:inline-block;
    margin-left:6px;
}
</style>

</body>
</html>
