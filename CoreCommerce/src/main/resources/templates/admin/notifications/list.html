<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout/head :: head"></head>
<body>

<div th:replace="layout/header :: header"></div>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold">🔔 알림 센터</h3>
    </div>

    <!-- 알림 메뉴 -->
    <div class="notification-menu">

        <!-- 1:1 문의 -->
        <a th:if="${loginUser.role == 'MANAGER'}"
           th:href="@{/admin/notifications(type='INQUIRY')}"
           th:classappend="${type == 'INQUIRY'} ? 'active' : ''"
           class="menu-card">

            <div class="menu-icon">💬</div>
            <div class="menu-title">1:1 문의</div>

        </a>

        <!-- 결제 -->
        <a th:if="${loginUser.role == 'MANAGER'}"
           th:href="@{/admin/notifications(type='ORDER')}"
           th:classappend="${type == 'ORDER'} ? 'active' : ''"
           class="menu-card">

            <div class="menu-icon">🧾</div>
            <div class="menu-title">결제</div>

        </a>

        <!-- 채팅 -->
        <a th:href="@{/admin/notifications(type='CHAT')}"
           th:classappend="${type == 'CHAT'} ? 'active' : ''"
           class="menu-card">

            <div class="menu-icon">🔔</div>
            <div class="menu-title">채팅</div>

        </a>

    </div>


    <!-- 알림 목록 -->
    <div class="card shadow-sm mt-4">
        <ul class="list-group list-group-flush">

            <li th:each="note : ${notifications}"
                class="list-group-item d-flex justify-content-between align-items-center">

                <span>
                    <strong class="badge bg-primary me-2"
                            th:text="${note.type}"></strong>

                    <a th:href="@{${note.link}}"
                       th:text="${note.content}"
                       class="text-decoration-none text-dark"></a>
                </span>

                <small class="text-muted"
                       th:text="${#dates.format(note.createdAt,'yyyy-MM-dd HH:mm')}"></small>

            </li>

            <li th:if="${notifications.isEmpty()}"
                class="list-group-item text-center text-muted py-4">

                선택한 카테고리의 알림이 없습니다.

            </li>

        </ul>
    </div>

</div>

<div th:replace="layout/footer :: footer"></div>


<style>

/* 메뉴 영역 */
.notification-menu{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(180px,1fr));
    gap:18px;
}

/* 카드 */
.menu-card{

    background:white;
    border-radius:14px;
    padding:20px;

    text-align:center;
    text-decoration:none;
    color:#333;

    border:1px solid #eee;

    transition: all 0.25s ease;
}

/* 아이콘 */
.menu-icon{
    font-size:32px;
    margin-bottom:8px;
}

/* 제목 */
.menu-title{
    font-weight:600;
    font-size:15px;
}

/* hover */
.menu-card:hover{
    transform:translateY(-4px);
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
    border-color:#0d6efd;
}

/* 활성 메뉴 */
.menu-card.active{

    background:#0d6efd;
    color:white;
    border-color:#0d6efd;

}

.menu-card.active .menu-icon{
    transform:scale(1.1);
}

</style>

</body>
</html>
