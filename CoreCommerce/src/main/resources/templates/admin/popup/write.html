<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="layout/head :: head"></head>

<body class="bg-light">

<div th:replace="layout/header :: header"></div>

<div class="container py-5" style="max-width:700px;">

    <div class="card shadow-lg border-0 rounded-4">
        <div class="card-body p-5">

            <h3 class="mb-4"
                th:text="${popup.id == null} ? '📢 팝업 등록' : '📢 팝업 수정'">
            </h3>

            <form th:action="@{/admin/popup/save}"
                  method="post"
                  enctype="multipart/form-data">

                <input type="hidden"
                       name="id"
                       th:value="${popup.id}">

                <!-- ========================= -->
                <!-- 제목 -->
                <!-- ========================= -->
                <div class="mb-3">
                    <label class="form-label">제목</label>
                    <input type="text"
                           name="title"
                           class="form-control"
                           th:value="${popup.title}"
                           required>
                </div>

                <!-- ========================= -->
                <!-- 링크 -->
                <!-- ========================= -->
                <div class="mb-3">
                    <label class="form-label">링크</label>
                    <input type="text"
                           name="linkUrl"
                           class="form-control"
                           th:value="${popup.linkUrl}">
                </div>

                <!-- ========================= -->
                <!-- 날짜 (🔥 null 안전 처리 추가) -->
                <!-- ========================= -->
                <div class="row">

                    <div class="col-md-6">
                        <label class="form-label">시작일</label>

                       <input type="datetime-local"
						       name="startDate"
						       class="form-control"
						       step="60"
						       th:value="${popup.startDate != null
						                  ? #temporals.format(popup.startDate,'yyyy-MM-dd''T''HH:mm')
						                  : ''}">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">종료일</label>

                        <input type="datetime-local"
						       name="endDate"
						       class="form-control"
						       step="60"
						       th:value="${popup.endDate != null
						                  ? #temporals.format(popup.endDate,'yyyy-MM-dd''T''HH:mm')
						                  : ''}">
                    </div>

                </div>

                <!-- ========================= -->
                <!-- 상태 -->
                <!-- ========================= -->
                <div class="mt-3">
                    <label class="form-label">사용 여부</label>

                    <select name="isActive"
                            class="form-select">

                        <option value="true"
                                th:selected="${popup.isActive == true}">
                            사용
                        </option>

                        <option value="false"
                                th:selected="${popup.isActive == false}">
                            미사용
                        </option>

                    </select>
                </div>

                <!-- ========================= -->
                <!-- 이미지 업로드 -->
                <!-- ========================= -->
               <div class="mt-3">
				    <label class="form-label">이미지 업로드</label>
				
				    <!-- 🔥 파일 선택 -->
				    <input type="file"
				           name="file"
				           class="form-control"
				           accept="image/*"
				           onchange="preview(event)">
				
				    <!-- 🔥 기존 이미지 유지용 (중요) -->
				    <input type="hidden"
				           name="imageUrl"
				           th:value="${popup.imageUrl}">
				
				</div>

                <!-- ========================= -->
                <!-- 기존 이미지 -->
                <!-- ========================= -->
                <div th:if="${popup.imageUrl != null}"
                     class="mt-4 text-center">

                    <p class="fw-bold">현재 이미지</p>

                    <img th:src="@{${popup.imageUrl}}"
                         class="rounded-3"
                         style="width:250px;">

                </div>

                <!-- ========================= -->
                <!-- 새 이미지 미리보기 -->
                <!-- ========================= -->
                <div class="mt-3 text-center">
                    <img id="previewImg"
                         style="display:none;
                                width:250px;
                                border-radius:10px;">
                </div>

                <!-- ========================= -->
                <!-- 저장 버튼 -->
                <!-- ========================= -->
                <button type="submit"
                        class="btn btn-dark w-100 mt-4">
                    저장
                </button>

            </form>

        </div>
    </div>

</div>

<!-- ========================= -->
<!-- 이미지 미리보기 JS -->
<!-- ========================= -->
<script>

function preview(event) {

    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = function(e) {

        const img = document.getElementById("previewImg");

        img.src = e.target.result;
        img.style.display = "block";
    };

    reader.readAsDataURL(file);
}

</script>

<div th:replace="layout/footer :: footer"></div>

</body>
</html>
