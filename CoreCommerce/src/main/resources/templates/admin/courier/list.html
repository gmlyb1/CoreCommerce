<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!-- ✅ HEAD -->
<head th:replace="layout/head :: head"></head>

<body>

<!-- ✅ HEADER -->
<div th:replace="layout/header :: header"></div>

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>🎟 택배사 관리</h3>

        <a href="/admin/courier/create"
           class="btn btn-primary">
            + 택배사 등록
        </a>
    </div>

    <!-- ✅ 쿠폰 테이블 -->
    <div class="card shadow-sm rounded-4 p-3">
        <table class="table table-hover text-center align-middle">

            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>택배사</th>
                <th>관리</th>
            </tr>
            </thead>

            <tbody>
          <!--   <tr th:each="list, iterStat : ${courierList}">
				<td th:text="${list.courier_no}"></td>
                <td th:text="${list.courier_name}"></td>

            </tr> -->
            
            <tr th:each="list, iterStat : ${courierList}">
			    <td th:text="${list.courier_no}"></td>
			    <td th:text="${list.courier_name}"></td>
			
			     <td>
			        <form th:action="@{/admin/courier/delete/{courier_no}(courier_no=${list.courier_no})}"
			              method="post"
			              style="display:inline;"
			              onsubmit="return confirm('삭제하시겠습니까?');">
			
			            <button type="submit" class="btn btn-danger btn-sm">
			                삭제
			            </button>
			        </form>
			    </td>
			</tr>
            </tbody>

        </table>
        	<div>
			    <ul class="pagination justify-content-center">
			
			        <!-- 이전 -->
			        <li class="page-item"
			            th:classappend="${pagination.first} ? 'disabled'">
			            <a class="page-link"
			               th:href="@{/admin/courier/list(page=${pagination.page - 1})}">
			                ‹
			            </a>
			        </li>
			
			          <li class="page-item"
				            th:each="i : ${#numbers.sequence(
				                T(java.lang.Math).max(1, pagination.page - 2),
				                T(java.lang.Math).min(pagination.totalPages, pagination.page + 2)
				            )}"
				            th:classappend="${i == pagination.page} ? 'active'">
				
				            <a class="page-link"
				               th:href="@{/admin/courier/list(page=${i})}"
				               th:text="${i}">
				            </a>
				
				        </li>
							        
			
			        <!-- 다음 -->
			        <li class="page-item"
			            th:classappend="${pagination.last} ? 'disabled'">
			
			            <a class="page-link"
			               th:href="@{/admin/courier/list(page=${pagination.page + 1})}">
			                ›
			            </a>
			        </li>
			
			    </ul>
			</div>
    </div>

</div>

<style>
.pagination {
    display: flex;
    flex-direction: row;
    justify-content: center;
    gap: 5px;
}

.pagination .page-item {
    display: inline-block;
}
</style>

<!-- ✅ FOOTER -->
<div th:replace="layout/footer :: footer"></div>

</body>
</html>
