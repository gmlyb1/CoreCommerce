<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="layout/head :: head"></head>

<body class="d-flex flex-column min-vh-100 bg-light">

<!-- ========================= -->
<!-- 헤더 -->
<!-- ========================= -->
<div th:replace="layout/header :: header"></div>

<div class="container flex-grow-1"
     style="margin-top:100px; max-width:500px; padding-bottom:150px;">

    <div class="card shadow-lg p-5" style="border-radius:15px;">

        <h3 class="text-center mb-4">내 프로필</h3>

        <!-- ========================= -->
        <!-- 🔥 프로필 수정 + 이미지 통합 폼 -->
        <!-- ========================= -->
        <form id="profileForm"
              enctype="multipart/form-data">

            <!-- 현재 프로필 이미지 -->
            <div class="text-center mb-4">

                <!-- 🔥 프로필 이미지 존재 -->
                <img th:if="${session.loginUser != null 
                             and session.loginUser.profileImage != null}"
                     th:src="@{${session.loginUser.profileImage}}"
                     width="150"
                     height="150"
                     class="rounded-circle">

                <!-- 🔥 기본 이미지 -->
                <img th:if="${session.loginUser == null 
                             or session.loginUser.profileImage == null}"
                     src="/images/default-profile.png"
                     width="150"
                     height="150"
                     class="rounded-circle">

            </div>

            <!-- 이름 -->
            <div class="mb-3">
                <label class="form-label">이름</label>
                <input type="text"
                       name="name"
                       class="form-control"
                       th:value="${session.loginUser?.name}">
            </div>

            <!-- 이메일 -->
            <div class="mb-3">
                <label class="form-label">이메일</label>
                <input type="text"
                       class="form-control"
                       th:value="${session.loginUser?.email}"
                       disabled>
            </div>

            <!-- 전화 -->
            <div class="mb-3">
                <label class="form-label">전화번호</label>
                <input type="text"
                       name="phone"
                       class="form-control"
                       th:value="${session.loginUser?.phone}">
            </div>

            <!-- 주소1 -->
            <div class="mb-3">
			    <label class="form-label">주소1</label>
			
			    <div class="input-group">
			        <input type="text"
			               name="address1"
			               id="address1"
			               class="form-control"
			               th:value="${session.loginUser?.address1}"
			               readonly>
			
			        <button type="button"
			                class="btn btn-outline-secondary"
			                onclick="execDaumPostcode()">
			            주소찾기
			        </button>
			    </div>
			</div>

            <!-- 주소2 -->
            <div class="mb-3">
                <label class="form-label">주소2</label>
                <input type="text"
                       name="address2"
                       class="form-control"
                       th:value="${session.loginUser?.address2}">
            </div>

            <!-- 🔥 프로필 이미지 업로드 -->
            <div class="mb-3">
                <label class="form-label">프로필 이미지 변경</label>
                <input type="file"
                       name="imageFile"
                       class="form-control"
                       accept="image/*">
            </div>

            <button type="submit"
                    class="btn btn-primary w-100">
                프로필 저장
            </button>

        </form>

        <hr class="my-4">

        <!-- ========================= -->
        <!-- 🔥 비밀번호 변경 -->
        <!-- ========================= -->
        <h5 class="mb-3">비밀번호 변경</h5>
        <form id="passwordForm">
            <div class="mb-3">
                <input type="password"
                       name="newPassword"
                       class="form-control"
                       placeholder="새 비밀번호">
            </div>
            <button type="submit"
                    class="btn btn-dark w-100">
                비밀번호 변경
            </button>
        </form>

    </div>
</div>

<!-- ========================= -->
<!-- Axios -->
<!-- ========================= -->
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
<script>

/* ===============================
   🔥 프로필 수정 + 이미지 업로드
=================================*/
document.getElementById("profileForm")
.addEventListener("submit", async function(e){

    e.preventDefault();

    const form = document.getElementById("profileForm");
    const formData = new FormData(form);

    try {
        await axios.post("/api/auth/profile/update",
            formData,
            {
                headers: {
                    "Content-Type": "multipart/form-data"
                }
            });

        alert("프로필 저장 완료");

        // 🔥 새로고침 (세션 갱신 반영)
        location.reload();

    } catch(err){
        alert("프로필 저장 실패");
        console.error(err);
    }
});


/* ===============================
   🔥 비밀번호 변경
=================================*/
document.getElementById("passwordForm")
.addEventListener("submit", async function(e){

    e.preventDefault();

    const newPassword =
        document.querySelector("input[name='newPassword']").value;

    try {
        await axios.post("/api/auth/profile/password",
            { newPassword: newPassword });

        alert("비밀번호 변경 완료");

        // 🔥 입력값 초기화
        document.querySelector("input[name='newPassword']").value = "";

    } catch(err){
        alert("비밀번호 변경 실패");
        console.error(err);
    }

});

function execDaumPostcode() {
    new daum.Postcode({
        oncomplete: function(data) {

            // 도로명 주소 or 지번 주소 선택
            var addr = data.userSelectedType === 'R'
                ? data.roadAddress
                : data.jibunAddress;

            // 주소 입력
            document.getElementById("address1").value = addr;
        }
    }).open();
}

</script>

<!-- ========================= -->
<!-- 푸터 -->
<!-- ========================= -->
<div th:replace="layout/footer :: footer"></div>

</body>
</html>
