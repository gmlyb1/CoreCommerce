<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout/head :: head"></head>

<style>
/* 상품 카드 */
.product-card {
    border: none;
    border-radius: 15px;
    transition: all 0.2s ease;
    position: relative;
}

.product-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.1);
}

/* 품절 상태 */
.out-of-stock {
    opacity: 0.6;
}

/* 품절 배지 */
.out-of-stock::after {
    content: "품절";
    position: absolute;
    top: 12px;
    right: 12px;
    background: #dc3545;
    color: #fff;
    padding: 6px 12px;
    font-size: 0.8rem;
    font-weight: bold;
    border-radius: 20px;
}

/* disabled 버튼 UX 개선 */
button:disabled {
    cursor: not-allowed;
    opacity: 0.7;
}
</style>

<body class="d-flex flex-column min-vh-100 bg-light">

<!-- 헤더 -->
<div th:replace="layout/header :: header"></div>

<div class="container mt-5 mb-5">

    <h3 class="mb-4 fw-bold">상품 목록</h3>

	<form method="get" action="/product/list" class="mb-4">
		
		<div th:if="${loginUser != null and 
             (loginUser.role == 'MANAGER' or loginUser.role == 'PRODUCTER')}"
		     class="mb-3">
		
		    <a href="/product/form"
		       class="btn btn-primary">
		        ➕ 상품 등록
		    </a>
		
		</div>
		
	    <div class="row g-2 align-items-end">
	
	        <div class="col-md-4">
	            <input type="text"
	                   name="keyword"
	                   class="form-control"
	                   placeholder="상품명 검색"
	                   th:value="${keyword}">
	        </div>
	
	        <div class="col-md-2">
	            <input type="number"
	                   name="minPrice"
	                   class="form-control"
	                   placeholder="최소 가격"
	                   th:value="${minPrice}">
	        </div>
	
	        <div class="col-md-2">
	            <input type="number"
	                   name="maxPrice"
	                   class="form-control"
	                   placeholder="최대 가격"
	                   th:value="${maxPrice}">
	        </div>
	
	        <div class="col-md-2">
	            <select name="sort" class="form-select">
				    <option value="latest"
				            th:selected="${sort == 'latest'}">
				        최신순
				    </option>
				
				    <option value="price_low"
				            th:selected="${sort == 'price_low'}">
				        가격 낮은순
				    </option>
				
				    <option value="price_high"
				            th:selected="${sort == 'price_high'}">
				        가격 높은순
				    </option>
				</select>
	        </div>
	
	        <div class="col-md-2">
	            <button type="submit" class="btn btn-dark w-100">
	                🔍 검색
	            </button>
	        </div>
	
	    </div>
	
	</form>
		

    <div class="row">

        <!-- 상품 반복 -->
        <div class="col-md-4 mb-4"
             th:each="p : ${products}">

            <div class="card product-card shadow-sm p-3"
                 th:classappend="${p.stock == 0} ? ' out-of-stock'">

                <!-- 상품 이미지 -->
                <a th:href="@{/product/{id}(id=${p.id})}">
				    <img th:src="${p.imageUrl}"
				         class="card-img-top rounded"
				         style="height: 200px; object-fit: cover; cursor:pointer;">
				</a>

                <div class="card-body text-center">

                    <!-- 상품명 -->
                    <h5 class="card-title fw-bold"
                        th:text="${p.name}">
                    </h5>

                    <!-- 가격 -->
                    <p class="text-primary fw-semibold mb-1"
                       th:text="${T(java.lang.String).format('%,d원', p.price)}">
                    </p>

                    <!-- 재고 표시 -->
                    <p class="small text-muted mb-2"
                       th:text="'재고 : ' + ${p.stock}">
                    </p>

					<button class="btn btn-outline-primary w-100 mb-2"
					        th:disabled="${p.stock == 0}"
					        th:onclick="'addToCart(' + ${p.id} + ')'">
					    🛒 장바구니 추가
					</button>
					
					<!-- 바로 구매 -->
					<button class="btn btn-primary w-100"
					        th:disabled="${p.stock == 0}"
					        th:onclick="'buyNow(' + ${p.id} + ')'">
					    💳 바로 구매
					</button>
					<br><br>
                    <!-- 관리자 전용 버튼 -->
                    <div th:if="${loginUser != null and 
                                 (loginUser.role == 'MANAGER' or loginUser.role == 'PRODUCTER')}">
						
                        <a th:href="@{/product/form(id=${p.id})}"
                           class="btn btn-sm btn-info me-2">
                            수정
                        </a>

                        <button class="btn btn-sm btn-danger"
                                th:onclick="'deleteProduct(' + ${p.id} + ')'">
                            삭제
                        </button>

                    </div> 

                </div>
            </div>

        </div>

    </div>
    
    <!-- 🔥 더보기 버튼 -->
	<div class="mt-4 pb-4" th:if="${pagination != null and pagination.totalPages > 1}">

         <ul class="pagination justify-content-center">

             <!-- 이전 -->
             <li class="page-item"
                 th:classappend="${pagination.first} ? 'disabled'">

                 <a class="page-link"
                    th:href="@{/product/list(page=${pagination.page - 1})}">
                     ‹
                 </a>
             </li>
             
             <li class="page-item"
        th:each="i : ${#numbers.sequence(
            T(java.lang.Math).max(1, pagination.page - 2),
            T(java.lang.Math).min(pagination.totalPages, pagination.page + 2)
        )}"
        th:classappend="${i == pagination.page} ? 'active'">

        <a class="page-link"
           th:href="@{/product/list(page=${i})}"
           th:text="${i}">
        </a>

    </li>

             <!-- 다음 -->
             <li class="page-item"
                 th:classappend="${pagination.last} ? 'disabled'">

                 <a class="page-link"
                    th:href="@{/product/list(page=${pagination.page + 1})}">
                     ›
                 </a>
             </li>

         </ul>
     </div>
    
</div>

<style>
.pagination {
    display: flex !important;
    justify-content: center !important;
    flex-direction: row !important;
}

.pagination .page-item {
    display: inline-block !important;
}

.pagination .page-link {
    display: inline-block !important;
}
</style>

<!-- 삭제 스크립트 -->
<script>
function deleteProduct(id) {
    if (!confirm("정말 삭제하시겠습니까?")) return;

    fetch("/product/delete?id=" + id, {
        method: "POST"
    })
    .then(() => {
        alert("삭제되었습니다.");
        location.reload();
    })
    .catch(() => {
        alert("삭제 실패");
    });
}

function addToCart(productId){

    fetch("/cart/add?productId=" + productId + "&quantity=1", {
        method: "POST"
    })
    .then(res => res.text())
    .then(() => {
        alert("장바구니에 추가되었습니다.");
    })
    .catch(() => alert("로그인 필요"));
}


async function buyNow(productId){

    if(!confirm("바로 결제하시겠습니까?")) return;

    try {

        // 🔥 단건 주문 생성 API 호출
        const res = await fetch("/order/create-single", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                productId: productId,
                quantity: 1
            })
        });

        if(res.status === 401){
            alert("로그인 필요");
            location.href = "/login";
            return;
        }

        if(!res.ok){
            throw new Error("주문 생성 실패");
        }

        const orderId = await res.text();

        // 🔥 바로 결제 페이지 이동
        location.href = "/payment?orderId=" + orderId;

    } catch(e){
        alert(e.message);
    }
}

let offset = 9;   // 처음 9개 로딩했다고 가정
const limit = 9;

function loadMore(){

    fetch(`/product/api/list?offset=${offset}&limit=${limit}`)
        .then(res => res.json())
        .then(data => {

            if(data.length === 0){
                document.getElementById("loadMoreBtn").disabled = true;
                document.getElementById("loadMoreBtn").innerText = "더 이상 상품 없음";
                return;
            }

            appendProducts(data);
            offset += limit;
        });
}


function appendProducts(products){

    const container = document.querySelector(".row");

    products.forEach(p => {

        const div = document.createElement("div");
        div.className = "col-md-4 mb-4";

        div.innerHTML = `
            <div class="card product-card shadow-sm p-3">
                <a href="/product/${p.id}">
                    <img src="${p.imageUrl}"
                         style="height:200px; object-fit:cover;"
                         class="card-img-top rounded">
                </a>

                <div class="card-body text-center">
                    <h5>${p.name}</h5>
                    <p class="text-primary">
                        ${p.price.toLocaleString()}원
                    </p>
                </div>
            </div>
        `;

        container.appendChild(div);
    });
}



</script>

<!-- 푸터 -->
<div th:replace="layout/footer :: footer"></div>

</body>
</html>
