<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="layout/head :: head"></head>

<body class="bg-light">

<div th:replace="layout/header :: header"></div>

<div class="container py-5" style="max-width:800px;">

    <h4 class="fw-bold mb-4">💬 채팅방 <span th:text="${room.id}"></span></h4>

    <!-- 채팅 메시지 영역 -->
    <div id="chatArea"
         class="border rounded-3 p-3 mb-2"
         style="height:400px; overflow-y:auto; background:white;">
    </div>

    <!-- typing 표시 -->
    <div id="typingIndicator"
         style="font-size:13px; color:gray; margin-bottom:10px;">
    </div>

    <!-- 메시지 입력 -->
    <div class="input-group">
        <input type="text"
               id="messageInput"
               class="form-control"
               placeholder="메시지를 입력하세요..." />
        <button class="btn btn-dark" id="sendBtn">전송</button>
    </div>

    <!-- 채팅방 나가기 -->
    <div class="mt-3 d-flex justify-content-between">
        <button class="btn btn-danger" id="leaveBtn">
            채팅방 나가기
        </button>
    </div>

</div>

<div th:replace="layout/footer :: footer"></div>

<!-- WebSocket -->
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

<script th:inline="javascript">
/*<![CDATA[*/

var roomId = [[${room.id}]];
var customerId = [[${customerId}]];
//var loginEmail = '[[${loginUser.email}]]';
var loginEmail = '[[${loginUser.email}]]'.replace(/"/g, '');
var loginName = '[[${loginUser.name}]]'.replace(/"/g, '');
var loginRole = '[[${loginUser.role}]]'; // MANAGER / PRODUCTER / CUSTOMER 등

var socket = new SockJS('/ws');
var stompClient = Stomp.over(socket);

stompClient.connect({}, function(frame) {

    console.log('roomId:', roomId);

    // 1️⃣ 기존 메시지 불러오기
    fetch('/chat/room/messages?roomId=' + roomId)
    .then(response => response.json())
    .then(messages => {
        var chatArea = document.getElementById("chatArea");
        chatArea.innerHTML = "";
        messages.forEach(msg => {
            var div = document.createElement("div");
            div.style.marginBottom = "5px";
            // 화면에 표시할 이름
            var displayName = (msg.sender === loginEmail) 
                              ? ((loginRole === "MANAGER" || loginRole === "PRODUCTER") ? "관리자" : "고객") 
                              : msg.displayName || "상대";
            div.textContent = displayName + " : " + msg.message;
            chatArea.appendChild(div);
        });
        chatArea.scrollTop = chatArea.scrollHeight;
    });

    // =========================
    // 채팅 메시지 구독
    // =========================
    stompClient.subscribe('/topic/room/' + roomId, function(message) {
        var msg = JSON.parse(message.body);
        var chatArea = document.getElementById("chatArea");

        var div = document.createElement("div");
        div.style.marginBottom = "5px";
        // 화면 표시용 이름
        var displayName = (msg.sender === loginEmail) 
                          ? ((loginRole === "MANAGER" || loginRole === "PRODUCTER") ? "관리자" : "고객") 
                          : msg.displayName || "상대";

        div.textContent = displayName + " : " + msg.message;

        chatArea.appendChild(div);
        chatArea.scrollTop = chatArea.scrollHeight;
    });

    // =========================
    // typing 표시 구독
    // =========================
    stompClient.subscribe('/topic/room/' + roomId + '/typing', function(message) {
        var data = JSON.parse(message.body);
        var typingDiv = document.getElementById("typingIndicator");
        var me = (loginRole === "MANAGER" || loginRole === "PRODUCTER") ? '관리자' : '고객';
        
        if(data.sender !== loginEmail){
            if(data.typing){
                typingDiv.innerHTML = loginName + "님이 입력 중...";
            }else{
                typingDiv.innerHTML = "";
            }
        }
    });

});

// =========================
// 메시지 전송
// =========================
document.getElementById("sendBtn").addEventListener("click", function() {
    var msgInput = document.getElementById("messageInput");
    var msgContent = msgInput.value.trim();

    if(msgContent.length > 0){
        var displayName = (loginRole === "MANAGER" || loginRole === "PRODUCTER") ? "관리자" : "고객";
        stompClient.send("/app/chat.sendMessage", {}, JSON.stringify({
            roomId: roomId,
            sender: loginEmail,      // DB 저장용
            displayName: displayName, // 화면 표시용
            message: msgContent
        }));

        msgInput.value = "";
        document.getElementById("typingIndicator").innerHTML = "";
    }
});

// =========================
// 엔터 전송
// =========================
document.getElementById("messageInput").addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        document.getElementById("sendBtn").click();
    }
});

// =========================
// typing 이벤트
// =========================
var typingTimeout;

document.getElementById("messageInput").addEventListener("keyup", function(){
    var displayName = (loginRole === "MANAGER" || loginRole === "PRODUCTER") ? "관리자" : "고객";

    stompClient.send("/app/chat.typing", {}, JSON.stringify({
        roomId: roomId,
        sender: loginEmail,      // DB 저장용
        displayName: displayName, // 화면 표시용
        typing: true
    }));

    clearTimeout(typingTimeout);

    typingTimeout = setTimeout(function(){
        stompClient.send("/app/chat.typing", {}, JSON.stringify({
            roomId: roomId,
            sender: loginEmail,
            displayName: displayName,
            typing: false
        }));
    }, 1000);
});

// =========================
// 채팅방 나가기
// =========================
document.getElementById("leaveBtn").addEventListener("click", function(){
    if(confirm("채팅방을 나가면 대화가 종료됩니다. 나가시겠습니까?")){
        fetch("/chat/room/leave", {
            method: "POST",
            headers:{
                "Content-Type":"application/x-www-form-urlencoded"
            },
            body: "roomId=" + roomId
        })
        .then(response => {
            if(response.redirected){
                window.location.href = response.url;
            }
        });
    }
});

/*]]>*/
</script>

</body>
</html>
