<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="layout/head :: head"></head>

<body style="background:#f8f9fa;">

<div th:replace="layout/header :: header"></div>

<div class="container py-5" style="max-width:1000px;">

    <h3 class="fw-bold mb-5 text-center">📦 주문 상세</h3>

    <!-- ================= 주문 정보 ================= -->
    <div class="card border-0 shadow-lg rounded-4 mb-5">
        <div class="card-body p-4">

            <div class="row mb-3">
                <div class="col-md-6">
                    <div class="text-muted small">주문번호</div>
                    <div class="fw-bold fs-5" th:text="${order.id}"></div>
                </div>

                <div class="col-md-6 text-md-end">
                    <div class="text-muted small">주문일</div>
                    <div class="fw-semibold"
                         th:text="${#temporals.format(order.createdAt, 'yyyy-MM-dd HH:mm')}">
                    </div>
                </div>
            </div>

            <hr>

            <div class="row align-items-center">
                <div class="col-md-6">
                    <div class="text-muted small">총 결제금액</div>
                    <div class="fs-4 fw-bold text-dark"
                         th:text="${#numbers.formatInteger(order.totalPrice,0,'COMMA')} + '원'">
                    </div>
                </div>

                <div class="col-md-6 text-md-end mt-3 mt-md-0">
                   <span class="badge px-4 py-2 fs-6"
					      th:classappend="${order.status == 'READY'} ? 'bg-secondary' :
					                      (${order.status == 'PAID'} ? 'bg-primary' :
					                      (${order.status == 'SHIPPED'} ? 'bg-warning text-dark' :
					                      (${order.status == 'DELIVERED'} ? 'bg-success' :
					                      (${order.status == 'CANCELLED'} ? 'bg-danger' : 'bg-dark'))))">
					
					    <span th:text="${order.status == 'READY'} ? '결제대기' :
					                   (${order.status == 'PAID'} ? '결제완료' :
					                   (${order.status == 'SHIPPED'} ? '배송중' :
					                   (${order.status == 'DELIVERED'} ? '배송완료' :
					                   (${order.status == 'CANCELLED'} ? '주문취소' : ''))))">
					    </span>
					
					</span>
                </div>
            </div>

            <!-- 배송 정보 -->
            <div th:if="${order.trackingNumber != null}"
                 class="mt-4 p-3 rounded-3"
                 style="background:#f1f3f5;">

                <div class="fw-bold mb-2">🚚 배송 정보</div>

                <div>
                    <span class="text-muted">택배사 :</span>
                    <span th:text="${order.courier}"></span>
                </div>

                <div>
                    <span class="text-muted">송장번호 :</span>
                    <span class="fw-semibold"
                          th:text="${order.trackingNumber}"></span>
                </div>

            </div>

        </div>
    </div>


    <!-- ================= 주문 상품 ================= -->
    <div class="card border-0 shadow-lg rounded-4">
        <div class="card-body p-4">

            <h5 class="fw-bold mb-4">🛍 주문 상품</h5>

            <div th:each="item : ${items}"
                 class="d-flex align-items-center mb-4 pb-4 border-bottom">

                <!-- 이미지 -->
                <div style="width:120px;">
                    <img th:src="@{${item.productImage}}"
                         class="img-fluid rounded-3 shadow-sm">
                </div>

                <!-- 상품 정보 -->
                <div class="flex-grow-1 ms-4">
                    <div class="fw-bold fs-5 mb-1"
                         th:text="${item.productName}">
                    </div>

                    <div class="text-muted">
                        수량 :
                        <span th:text="${item.quantity}"></span>개
                    </div>
                </div>

                <!-- 가격 -->
                <div class="text-end">
                    <div class="fs-5 fw-bold"
                         th:text="${#numbers.formatInteger(item.price,0,'COMMA')} + '원'">
                    </div>
                </div>

            </div>

        </div>
    </div>

</div>

<div th:replace="layout/footer :: footer"></div>

</body>
</html>
