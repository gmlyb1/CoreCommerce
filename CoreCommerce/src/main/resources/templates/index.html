<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head th:replace="layout/head :: head">
    <meta charset="utf-8">
    <title>CoreCommerce</title>
</head>

<body class="coupang-body">

<div th:replace="layout/header :: header"></div>

<!-- ========================= BANNER ========================= -->

<div class="banner-wrap">
    <div class="container">
        <div class="header-carousel owl-carousel">

            <div class="banner-item"
                 th:each="banner : ${bannerList}"
                 th:if="${banner.useYn == 'Y'}">

                <img th:if="${banner.imageUrl != null}"
                     th:src="@{${banner.imageUrl}}"
                     class="img-fluid rounded">

                <div class="banner-text">
                    <h5 th:text="${banner.subtitle}"></h5>
                    <h2 th:text="${banner.title}"></h2>
                    <p th:text="${banner.description}"></p>

                    <a th:if="${banner.linkUrl != null}"
                       th:href="${banner.linkUrl}"
                       class="btn btn-coupang">
                        상품 보러가기
                    </a>
                </div>

            </div>

        </div>
    </div>
</div>

<!-- ======================= 광고 상품 ======================= -->

<div class="container section-block">

    <h2 class="section-title">광고 상품</h2>

    <div class="row g-4">

        <div class="col-md-6"
             th:each="offer : ${offerProductList}">

            <a th:href="@{/product/{id}(id=${offer.id})}"
               class="offer-card">

                <div>
                    <p class="text-muted small" th:text="${offer.description}"></p>
                    <h4 class="fw-bold" th:text="${offer.name}"></h4>
                    <h3 class="text-danger">
                        <span th:text="${offer.discountPercent + '%'}"></span> 할인
                    </h3>
                </div>

                <img th:src="${offer.imageUrl}" class="offer-img">

            </a>

        </div>

    </div>
</div>

<!-- ===================== 메인 상품 ====================== -->

<div class="container section-block">

    <h2 class="section-title">전체 상품</h2>

    <div class="row g-4">

        <div class="col-md-6 col-lg-3"
             th:each="product : ${MainPageList}">

            <div class="product-card"
                 th:classappend="${product.stock == 0} ? 'soldout-card'">

                <div class="product-img-wrap">

                    <img th:src="${product.imageUrl}"
                         class="product-img"
                         th:classappend="${product.stock == 0} ? 'soldout-img'">

                    <!-- <div class="soldout-label"
                         th:if="${product.stock == 0}">
                        품절
                    </div> -->

                </div>

                <div class="product-info">
                    <div class="category" th:text="${product.category}"></div>
                    <div class="name" th:text="${product.name}"></div>

                    <div class="price-box">

					    <div class="price-current"
					         th:text="${#numbers.formatInteger(product.price,3,'COMMA')} + '원'">
					    </div>
					
					    <!-- 할인율 있으면 표시 -->
					    <div class="discount-badge"
					         th:if="${product.discountPercent != null and product.discountPercent > 0}"
					         th:text="'-' + ${product.discountPercent} + '%'">
					    </div>
					
					</div>
                </div>

                <button class="btn btn-coupang w-100"
                        th:disabled="${product.stock == 0}"
                        th:text="${product.stock == 0} ? '품절' : '장바구니'"
                        th:onclick="${product.stock > 0} ? 
                        'addToCart(' + ${product.id} + ')'">
                </button>

            </div>

        </div>

    </div>
</div>

<!-- ===================== 전체 상품 캐러셀 ====================== -->

<div class="container section-block">

    <h2 class="section-title">추천 상품</h2>

    <div class="productList-carousel owl-carousel">

        <div class="mini-product"
             th:each="product : ${AllProductList}">

            <img th:src="${product.imageUrl}" class="mini-img">

            <div class="mini-info">
                <div class="mini-name" th:text="${product.name}"></div>
                <div class="mini-price"
                     th:text="${product.price + '원'}"></div>
            </div>

        </div>

    </div>
</div>

<div th:replace="layout/footer :: footer"></div>

<!-- ========================= STYLE =========================== -->

<style>

/* ===================================================== */
/* 🔥 기본 세팅 */
/* ===================================================== */

body.coupang-body {
    background: #f2f4f7;
    font-family: "Pretendard", sans-serif;
}

/* ===================================================== */
/* 🔥 공통 섹션 */
/* ===================================================== */

.section-block {
    background: #ffffff;
    padding: 50px;
    margin-top: 40px;
    border-radius: 20px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.04);
}

.section-title {
    font-size: 24px;
    font-weight: 800;
    margin-bottom: 30px;
    position: relative;
}

.section-title::after {
    content: "";
    width: 50px;
    height: 4px;
    background: #346aff;
    position: absolute;
    bottom: -10px;
    left: 0;
    border-radius: 4px;
}

/* ===================================================== */
/* 🔥 배너 */
/* ===================================================== */

.banner-wrap {
    background: #ffffff;
    padding: 60px 0;
    border-radius: 0 0 40px 40px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.03);
}

.banner-item {
    display: flex;
    gap: 50px;
    align-items: center;
}

.banner-text h2 {
    font-weight: 800;
    font-size: 32px;
}

.banner-text p {
    color: #666;
}

/* ===================================================== */
/* 🔥 광고 카드 */
/* ===================================================== */

.offer-card {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: linear-gradient(135deg,#fff5f5,#ffffff);
    border: none;
    padding: 30px;
    border-radius: 20px;
    text-decoration: none;
    color: #000;
    transition: all 0.3s ease;
}

.offer-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 20px 45px rgba(0,0,0,0.08);
}

.offer-card h4 {
    font-weight: 700;
}

.offer-img {
    max-height: 150px;
    transition: 0.4s;
}

.offer-card:hover .offer-img {
    transform: scale(1.08);
}

/* ===================================================== */
/* 🔥 상품 카드 */
/* ===================================================== */

.product-card {
    border: 1px solid #f0f0f0;
    padding: 18px;
    border-radius: 20px;
    background: #fff;
    transition: all 0.3s ease;
}

.product-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 25px 50px rgba(0,0,0,0.08);
}

.product-img {
    width: 100%;
    height: 230px;
    object-fit: cover;
    border-radius: 14px;
    transition: 0.4s;
}

.product-card:hover .product-img {
    transform: scale(1.05);
}

.product-info {
    margin-top: 12px;
}

.category {
    font-size: 12px;
    color: #999;
}

.name {
    font-size: 15px;
    font-weight: 700;
    min-height: 40px;
}

/* ===================================================== */
/* 🔥 가격 영역 */
/* ===================================================== */

.price-box {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 8px;
}

.price-current {
    font-size: 18px;
    font-weight: 800;
    color: #111;
}

.discount-badge {
    background: #ff3b3b;
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    padding: 4px 8px;
    border-radius: 20px;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
}

/* ===================================================== */
/* 🔥 버튼 */
/* ===================================================== */

.btn-coupang {
    background: linear-gradient(90deg,#346aff,#1f4ed8);
    border: none;
    color: #fff;
    font-weight: 700;
    padding: 12px;
    border-radius: 12px;
    transition: all 0.3s ease;
}

.btn-coupang:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(52,106,255,0.4);
}

/* ===================================================== */
/* 🔥 품절 */
/* ===================================================== */

.soldout-card {
    opacity: 0.6;
}

.soldout-img {
    filter: grayscale(100%);
}

/* ===================================================== */
/* 🔥 추천 상품 (캐러셀) */
/* ===================================================== */

.productList-carousel {
    position: relative;
}

.mini-product {
    border: 1px solid #f0f0f0;
    padding: 18px;
    border-radius: 18px;
    background: #fff;
    text-align: center;
    transition: all 0.3s ease;
}

.mini-product:hover {
    transform: translateY(-6px);
    box-shadow: 0 18px 40px rgba(0,0,0,0.08);
}

.mini-img {
    height: 130px;
    width: 100%;
    object-fit: cover;
    border-radius: 12px;
    transition: 0.4s;
}

.mini-product:hover .mini-img {
    transform: scale(1.08);
}

.mini-name {
    font-size: 13px;
    margin-top: 10px;
    font-weight: 600;
}

.mini-price {
    font-weight: 800;
    color: #e60023;
}

/* ===================================================== */
/* 🔥 캐러셀 화살표 */
/* ===================================================== */

.productList-carousel .owl-nav {
    position: absolute;
    top: 45%;
    width: 100%;
    display: flex;
    justify-content: space-between;
}

.productList-carousel .owl-nav button {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    background: #fff !important;
    border: 1px solid #ddd !important;
    box-shadow: 0 6px 18px rgba(0,0,0,0.12);
}

.productList-carousel .owl-nav button:hover {
    background: #346aff !important;
    border-color: #346aff !important;
    color: #fff !important;
}

/* ===================================================== */
/* 🔥🔥🔥 모바일 최적화 */
/* ===================================================== */

@media (max-width: 768px) {

    .section-block {
        padding: 20px;
        margin-top: 15px;
        border-radius: 14px;
    }

    .section-title {
        font-size: 18px;
        margin-bottom: 15px;
    }

    .banner-wrap {
        padding: 25px 0;
        border-radius: 0;
    }

    .banner-item {
        flex-direction: column;
        gap: 15px;
        text-align: center;
    }

    .banner-text h2 {
        font-size: 20px;
    }

    .offer-card {
        flex-direction: column;
        text-align: center;
        padding: 18px;
        border-radius: 14px;
    }

    .offer-img {
        max-height: 90px;
        margin-top: 10px;
    }

    .product-card {
        padding: 12px;
        border-radius: 14px;
    }

    .product-img {
        height: 150px;
        border-radius: 10px;
    }

    .price-current {
        font-size: 14px;
    }

    .discount-badge {
        font-size: 9px;
        padding: 3px 6px;
    }

    .btn-coupang {
        font-size: 13px;
        padding: 8px;
        border-radius: 8px;
    }

    .mini-product {
        padding: 12px;
        border-radius: 14px;
    }

    .mini-img {
        height: 90px;
    }

    /* 모바일에서 화살표 제거 */
    .productList-carousel .owl-nav {
        display: none;
    }
}

</style>
	<script th:inline="javascript">
/*<![CDATA[*/

document.addEventListener("DOMContentLoaded", function () {

    var popup = /*[[${popup}]]*/ null;

    if (popup != null) {

        window.open(
            "/popup/view/" + popup.id,
            "popupWindow",
            "width=600,height=700,left=500,top=200"
        );
    }

});

/*]]>*/
</script>
	<script>
	$(document).ready(function(){
	
	    $(".productList-carousel").owlCarousel({
	        loop: true,
	        margin: 20,
	        nav: true,          // 🔥 이거 있어야 화살표 나옴
	        dots: false,
	        autoplay: false,
	        responsive: {
	            0: { items: 1 },
	            768: { items: 2 },
	            1024: { items: 4 }
	        }
	    });
	
	});
	
	function addToCart(productId) {

	    fetch("/cart/add", {
	        method: "POST",
	        headers: {
	            "Content-Type": "application/x-www-form-urlencoded"
	        },
	        body: "productId=" + productId + "&quantity=1"
	    })
	    .then(res => {
	        if (!res.ok) throw new Error();
	        return res.text();
	    })
	    .then(() => {
	        alert("장바구니에 추가하였습니다.");
	    })
	    .catch(() => alert("로그인 필요 또는 서버 오류"));
	}
	</script>
</body>
</html>
