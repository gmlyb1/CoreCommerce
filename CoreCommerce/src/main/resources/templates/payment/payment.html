<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout/head :: head"></head>
<body class="d-flex flex-column min-vh-100">

<div th:replace="layout/header :: header"></div>

<div class="container flex-grow-1 mt-5 mb-5 text-center">

    <h3>💳 결제 페이지</h3>

    <!-- ================= 주문 정보 ================= -->
    <div class="mt-4">
        <p>주문번호 :
            <b th:text="${order.id}">0</b>
        </p>

        <p>상품금액 :
            <b id="originalPrice"
               th:text="${T(java.lang.String).format('%,d원', order.totalPrice)}">
            </b>
        </p>

        <!-- 🔥 최종 금액 -->
        <p class="fs-5 fw-bold">
            최종 결제금액 :
            <b id="finalPrice"
               th:text="${T(java.lang.String).format('%,d원', order.totalPrice)}">
            </b>
        </p>
    </div>

    <!-- ================= 쿠폰 선택 ================= -->
    <div class="mt-4">
        <h5>🎁 쿠폰 사용</h5>

        <select id="couponSelect"
                class="form-select w-50 mx-auto">

            <option value="">쿠폰 선택 안함</option>

            <option th:each="mc : ${myCoupons}"
                    th:value="${mc.id}"
                    th:text="'쿠폰 #' + ${mc.couponId}"
                    th:disabled="${mc.used}">
            </option>

        </select>
    </div>

    <!-- ================= Toss ================= -->
    <div class="mt-4" id="payment-method"></div>
    <div class="mt-3" id="agreement"></div>

    <button class="btn btn-primary mt-4" id="payBtn">
        결제 진행
    </button>

</div>

<div th:replace="layout/footer :: footer"></div>

<script src="https://js.tosspayments.com/v2/standard"></script>

<script th:inline="javascript">
/*<![CDATA[*/

const clientKey = "test_gck_docs_Ovk5rk1EwkEbP0W43n07xlzm";

const rawOrderId = /*[[${order != null ? order.id : 0}]]*/ 0;

let amount = /*[[${order != null ? order.totalPrice : 0}]]*/ 0;

let widgets;

/* ================= Toss 초기화 ================= */
async function init() {

    const tossPayments = TossPayments(clientKey);

    widgets = tossPayments.widgets({
        customerKey: "CUSTOMER_" + rawOrderId
    });

    await widgets.setAmount({
        currency: "KRW",
        value: amount
    });

    await widgets.renderPaymentMethods({
        selector: "#payment-method"
    });

    await widgets.renderAgreement({
        selector: "#agreement"
    });
}

init();


/* ================= 쿠폰 선택 ================= */
document.getElementById("couponSelect")
.addEventListener("change", function () {

    const memberCouponId = this.value || null;

    let bodyData = "orderId=" + rawOrderId;

    // 🔥 memberCouponId가 있을 때만 전송
    if(memberCouponId){
        bodyData += "&memberCouponId=" + memberCouponId;
    }

    fetch("/payment/apply-coupon", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: bodyData
    })
    .then(res => {
        if(!res.ok){
            throw new Error("서버 에러");
        }
        return res.json();
    })
    .then(data => {

        // 🔥 서버에서 계산된 최종 금액
        amount = data.finalPrice;

        document.getElementById("finalPrice")
            .innerText = amount.toLocaleString() + "원";

        // 🔥 Toss 금액 다시 세팅
        widgets.setAmount({
            currency: "KRW",
            value: amount
        });

    })
    .catch(err => {
        console.error("쿠폰 적용 오류", err);
        alert("쿠폰 적용 실패");
    });

});


/* ================= 결제 ================= */
document.getElementById("payBtn")
.addEventListener("click", async function () {

    try {

        await widgets.requestPayment({

            orderId: "ORD_" + rawOrderId,
            orderName: "CoreCommerce 주문",

            successUrl: window.location.origin + "/payment/success",
            failUrl: window.location.origin + "/payment/fail"

        });

    } catch (error) {
        console.error(error);
        alert("결제 요청 실패");
    }

});

/*]]>*/
</script>

</body>
</html>
